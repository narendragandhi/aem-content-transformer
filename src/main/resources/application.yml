spring:
  application:
    name: aem-content-transformer

  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:llama3.2}
          temperature: 0.3
          num-predict: 1024

# WordPress configuration
wordpress:
  source-url: ${WORDPRESS_URL:https://example.wordpress.com}
  api-path: /wp-json/wp/v2
  tags:
    warmup:
      enabled: ${WP_TAG_WARMUP_ENABLED:false}
      per-page: ${WP_TAG_WARMUP_PER_PAGE:100}
      max-pages: ${WP_TAG_WARMUP_MAX_PAGES:10}

# For integration test override (wordpress.org/news)
---
spring:
  config:
    activate:
      on-profile: test
wordpress:
  api-path: /wp-json/wp/v2

# AEM output configuration
aem:
  output-path: ${AEM_OUTPUT_PATH:./output}
  package-name: ${AEM_PACKAGE_NAME:content-migration}
  site-path: ${AEM_SITE_PATH:/content/mysite}
  package-zip: ${AEM_PACKAGE_ZIP:false}
  filevault:
    enabled: ${AEM_FILEVAULT_ENABLED:false}
    command: ${AEM_FILEVAULT_COMMAND:vault}
    validate: ${AEM_FILEVAULT_VALIDATE:false}
  template-path: ${AEM_TEMPLATE_PATH:/conf/mysite/settings/wcm/templates/content-page}
  design-path: ${AEM_DESIGN_PATH:}
  asset:
    download: ${AEM_ASSET_DOWNLOAD:true}
    max-bytes: ${AEM_ASSET_MAX_BYTES:52428800}
    retry:
      max-attempts: ${AEM_ASSET_RETRY_MAX:3}
      delay-ms: ${AEM_ASSET_RETRY_DELAY_MS:1000}
    download:
      delay-ms: ${AEM_ASSET_DOWNLOAD_DELAY_MS:0}
    upload:
      delay-ms: ${AEM_ASSET_UPLOAD_DELAY_MS:0}
    api:
      enabled: ${AEM_ASSET_API_ENABLED:false}
      upload-url-template: ${AEM_ASSET_API_UPLOAD_URL:}
      verify:
        enabled: ${AEM_ASSET_API_VERIFY_ENABLED:false}
        verify-url-template: ${AEM_ASSET_API_VERIFY_URL:}
        timeout-ms: ${AEM_ASSET_API_VERIFY_TIMEOUT_MS:60000}
        interval-ms: ${AEM_ASSET_API_VERIFY_INTERVAL_MS:2000}
      auth:
        type: ${AEM_ASSET_API_AUTH_TYPE:}
        user: ${AEM_ASSET_API_AUTH_USER:}
        password: ${AEM_ASSET_API_AUTH_PASSWORD:}
        token: ${AEM_ASSET_API_AUTH_TOKEN:}
  allowed-templates: ${AEM_ALLOWED_TEMPLATES:}
  cloudservice-configs: ${AEM_CLOUDSERVICE_CONFIGS:}
  html:
    policy: ${AEM_HTML_POLICY:relaxed}
    allowed-tags: ${AEM_HTML_ALLOWED_TAGS:}
    allowed-attrs: ${AEM_HTML_ALLOWED_ATTRS:}
    allowed-protocols: ${AEM_HTML_ALLOWED_PROTOCOLS:}
  tags:
    root: ${AEM_TAGS_ROOT:/content/cq:tags/mysite}
  fragments:
    enabled: ${AEM_FRAGMENTS_ENABLED:false}
    content-model: ${AEM_FRAGMENT_MODEL:/conf/mysite/settings/dam/cfm/models/article}
    dam-path: ${AEM_FRAGMENT_DAM_PATH:/content/dam/mysite/fragments}
    xf-path: ${AEM_XF_PATH:/content/experience-fragments/mysite}
    xf-template: ${AEM_XF_TEMPLATE:/conf/mysite/settings/wcm/templates/experience-fragment}
    embed-xf-on-page: ${AEM_EMBED_XF_ON_PAGE:false}
  validation:
    enabled: ${AEM_VALIDATION_ENABLED:false}
    base-url: ${AEM_VALIDATION_BASE_URL:}
    health-path: ${AEM_VALIDATION_HEALTH_PATH:/system/health.json}
    extra-paths: ${AEM_VALIDATION_EXTRA_PATHS:}
    auth:
      type: ${AEM_VALIDATION_AUTH_TYPE:}
      user: ${AEM_VALIDATION_AUTH_USER:}
      password: ${AEM_VALIDATION_AUTH_PASSWORD:}
      token: ${AEM_VALIDATION_AUTH_TOKEN:}

# Logging configuration
logging:
  level:
    root: INFO
    com.example.aemtransformer: DEBUG
    org.bsc.langgraph4j: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Server configuration (optional, for REST API)
server:
  port: ${SERVER_PORT:8080}

rate:
  wp:
    requests-per-second: ${WP_RPS:0}
  aem:
    requests-per-second: ${AEM_RPS:0}

migration:
  batch:
    checkpoint:
      enabled: ${MIGRATION_CHECKPOINT_ENABLED:true}
      interval: ${MIGRATION_CHECKPOINT_INTERVAL:100}
      path: ${MIGRATION_CHECKPOINT_PATH:./output/checkpoint.json}
    retry-failed: ${MIGRATION_RETRY_FAILED:true}
    skip-output-check: ${MIGRATION_SKIP_OUTPUT_CHECK:false}
  delta:
    since: ${MIGRATION_DELTA_SINCE:}
  manifest:
    filename: ${MIGRATION_MANIFEST_FILENAME:manifest.jsonl}
  dlq:
    filename: ${MIGRATION_DLQ_FILENAME:dlq.jsonl}
  report:
    path: ${MIGRATION_REPORT_PATH:./output/report.json}
  parity:
    enabled: ${MIGRATION_PARITY_ENABLED:true}
    filename: ${MIGRATION_PARITY_FILENAME:parity.jsonl}
